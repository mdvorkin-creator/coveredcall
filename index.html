<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CoveredCall.io · Analizador de TNA</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@400;600;800;900&display=swap');

  :root {
    --bg: #070709; --s1: #0e0e14; --s2: #16161f; --s3: #1e1e2a;
    --border: #252533; --acc: #c8ff57; --acc2: #ff5757; --acc3: #57b8ff; --acc4: #ffaa57;
    --text: #ddddf0; --muted: #5a5a7a;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { background: var(--bg); color: var(--text); font-family: 'Space Mono', monospace; min-height: 100vh; }

  .topbar {
    background: var(--s1); border-bottom: 1px solid var(--border);
    padding: 0 24px; height: 56px; display: flex; align-items: center; gap: 16px;
    position: sticky; top: 0; z-index: 100;
  }
  .logo { font-family: 'Syne', sans-serif; font-weight: 900; font-size: 16px; }
  .logo em { color: var(--acc); font-style: normal; }
  .divider { width: 1px; height: 24px; background: var(--border); }

  .field-wrap { display: flex; align-items: center; gap: 7px; }
  .lbl { font-size: 9px; color: var(--muted); letter-spacing: 1.5px; text-transform: uppercase; white-space: nowrap; }
  .inp {
    background: var(--s3); border: 1px solid var(--border); color: var(--text);
    font-family: 'Space Mono', monospace; font-size: 12px; padding: 7px 10px;
    border-radius: 4px; outline: none; transition: border-color 0.15s;
  }
  .inp:focus { border-color: var(--acc); box-shadow: 0 0 0 2px rgba(200,255,87,0.1); }
  .inp.ticker { font-family: 'Syne', sans-serif; font-weight: 800; font-size: 14px; color: var(--acc); width: 90px; text-transform: uppercase; }
  .inp.expiry { width: 145px; }

  .btn {
    background: var(--acc); color: #070709; border: none;
    font-family: 'Syne', sans-serif; font-weight: 800; font-size: 11px;
    letter-spacing: 1px; padding: 9px 20px; border-radius: 4px; cursor: pointer;
    text-transform: uppercase; transition: all 0.15s; white-space: nowrap;
  }
  .btn:hover:not(:disabled) { background: #d9ff6e; transform: translateY(-1px); }
  .btn:disabled { opacity: 0.45; cursor: wait; }

  .pill { font-size: 10px; padding: 4px 10px; border-radius: 20px; white-space: nowrap; }
  .pill-idle { background: var(--s3); color: var(--muted); }
  .pill-loading { background: rgba(200,255,87,0.1); color: var(--acc); border: 1px solid rgba(200,255,87,0.3); animation: pp 1s infinite; }
  .pill-ok { background: rgba(200,255,87,0.12); color: var(--acc); border: 1px solid rgba(200,255,87,0.25); }
  .pill-err { background: rgba(255,87,87,0.12); color: var(--acc2); border: 1px solid rgba(255,87,87,0.25); }
  @keyframes pp { 0%,100%{opacity:1} 50%{opacity:0.4} }

  .content { padding: 24px; display: flex; flex-direction: column; gap: 18px; max-width: 1300px; margin: 0 auto; }

  .splash { display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 70vh; gap: 12px; color: var(--muted); text-align: center; }
  .splash-icon { font-size: 48px; opacity: 0.2; }
  .splash-title { font-family: 'Syne', sans-serif; font-size: 20px; font-weight: 800; opacity: 0.3; }
  .splash-sub { font-size: 11px; opacity: 0.3; line-height: 2; }
  .loading-bar { height: 2px; width: 220px; background: linear-gradient(90deg, transparent, var(--acc), transparent); background-size: 200%; animation: shimmer 1.1s linear infinite; border-radius: 2px; }
  @keyframes shimmer { 0%{background-position:200%} 100%{background-position:-200%} }

  /* HEADER RESULTADO */
  .res-header {
    background: var(--s1); border: 1px solid var(--border); border-radius: 8px;
    padding: 20px 24px; display: flex; align-items: center; gap: 32px; flex-wrap: wrap;
  }
  .res-ticker { font-family: 'Syne', sans-serif; font-weight: 900; font-size: 32px; color: var(--acc); letter-spacing: -1px; }
  .res-price { font-family: 'Syne', sans-serif; font-weight: 700; font-size: 26px; }
  .res-chg { font-size: 12px; margin-top: 4px; }
  .pos { color: #4dff8f; } .neg { color: var(--acc2); }
  .res-meta { display: flex; gap: 28px; margin-left: auto; flex-wrap: wrap; }
  .rm { text-align: center; }
  .rm-l { font-size: 9px; color: var(--muted); letter-spacing: 1px; text-transform: uppercase; }
  .rm-v { font-family: 'Syne', sans-serif; font-weight: 700; font-size: 15px; margin-top: 3px; }

  /* FORMULA */
  .formula {
    background: rgba(200,255,87,0.04); border: 1px solid rgba(200,255,87,0.15);
    border-radius: 6px; padding: 12px 18px; font-size: 11px; color: var(--acc); line-height: 2;
  }
  .formula b { color: #fff; }

  /* TABLA */
  .tbl-wrap { background: var(--s1); border: 1px solid var(--border); border-radius: 8px; overflow: hidden; }
  .tbl-bar { padding: 12px 18px; border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; }
  .tbl-title { font-family: 'Syne', sans-serif; font-size: 10px; font-weight: 600; letter-spacing: 2px; color: var(--muted); text-transform: uppercase; }

  table { width: 100%; border-collapse: collapse; }
  thead th { background: var(--s3); padding: 9px 16px; text-align: right; font-size: 9px; letter-spacing: 1px; color: var(--muted); text-transform: uppercase; border-bottom: 1px solid var(--border); }
  thead th:first-child { text-align: left; }
  tbody td { padding: 12px 16px; text-align: right; border-bottom: 1px solid rgba(37,37,51,0.5); font-size: 12px; }
  tbody td:first-child { text-align: left; font-weight: 700; }
  tbody tr:last-child td { border-bottom: none; }
  tbody tr:hover { background: rgba(255,255,255,0.02); }
  tbody tr.best td { background: rgba(200,255,87,0.04); }

  .chip { display: inline-block; padding: 3px 9px; border-radius: 3px; font-size: 11px; font-weight: 700; font-family: 'Syne', sans-serif; }
  .chi { background: rgba(200,255,87,0.15); color: var(--acc); }
  .chm { background: rgba(87,184,255,0.15); color: var(--acc3); }
  .chl { background: rgba(255,170,87,0.15); color: var(--acc4); }
  .chx { background: rgba(255,87,87,0.12); color: var(--acc2); }

  /* CHARTS */
  .charts-row { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
  .ch-card { background: var(--s1); border: 1px solid var(--border); border-radius: 8px; padding: 16px; }
  .ch-card canvas { background: var(--s1) !important; }
  .ch-title { font-family: 'Syne', sans-serif; font-size: 9px; font-weight: 600; letter-spacing: 1.5px; color: var(--muted); text-transform: uppercase; margin-bottom: 12px; }

  .warn { background: rgba(255,170,87,0.06); border: 1px solid rgba(255,170,87,0.2); border-radius: 6px; padding: 10px 14px; font-size: 10px; color: var(--acc4); line-height: 1.8; }
  .dot { width: 5px; height: 5px; border-radius: 50%; background: var(--acc); display: inline-block; animation: dp 2s infinite; vertical-align: middle; margin-right: 5px; }
  @keyframes dp { 0%,100%{opacity:1} 50%{opacity:0.2} }

  @media (max-width: 800px) { .charts-row { grid-template-columns: 1fr; } .topbar { flex-wrap: wrap; height: auto; padding: 12px; } }
</style>
</head>
<body>

<div class="topbar">
  <div class="logo">COVERED<em>CALL</em>.io</div>
  <div class="divider"></div>
  <div class="field-wrap">
    <span class="lbl">Ticker</span>
    <input class="inp ticker" id="ticker" value="META" maxlength="6" oninput="this.value=this.value.toUpperCase()">
  </div>
  <div class="field-wrap">
    <span class="lbl">Vencimiento</span>
    <input class="inp expiry" id="expiryIn" type="date" value="2026-04-17">
  </div>
  <button class="btn" id="btnBuscar" onclick="buscar()">⚡ BUSCAR</button>
  <span class="pill pill-idle" id="pill">En espera</span>
</div>

<div class="content">
  <div id="splash" class="splash">
    <div class="splash-icon">📊</div>
    <div class="splash-title">Analizador de Covered Calls</div>
    <div class="splash-sub">
      Ingresá el ticker y la fecha de vencimiento.<br>
      Buscamos el precio y las 10 bases OTM automáticamente.<br>
      Calculamos la TNA de cada una al instante.
    </div>
  </div>
  <div id="results" style="display:none;flex-direction:column;gap:18px"></div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<script>

function diasHasta(dateStr) {
  const hoy = new Date(); hoy.setHours(0,0,0,0);
  return Math.max(1, Math.ceil((new Date(dateStr + 'T00:00:00') - hoy) / 86400000));
}
function fmt(n, d=2) { return parseFloat(n).toLocaleString('en-US', {minimumFractionDigits:d, maximumFractionDigits:d}); }
function setStatus(txt, type) { const el = document.getElementById('pill'); el.textContent = txt; el.className = 'pill pill-' + type; }

function badge(tna) {
  const p = (tna*100).toFixed(1)+'%';
  if (tna >= 0.30) return `<span class="chip chi">${p}</span>`;
  if (tna >= 0.15) return `<span class="chip chm">${p}</span>`;
  if (tna >= 0.08) return `<span class="chip chl">${p}</span>`;
  return `<span class="chip chx">${p}</span>`;
}

let charts = {};
function dc(id) { if(charts[id]){ charts[id].destroy(); delete charts[id]; } }

async function buscar() {
  const ticker = document.getElementById('ticker').value.toUpperCase().trim();
  const expiry = document.getElementById('expiryIn').value;
  if (!ticker || !expiry) { alert('Completá ticker y fecha'); return; }

  const btn = document.getElementById('btnBuscar');
  btn.disabled = true;
  setStatus('Buscando...', 'loading');
  document.getElementById('splash').style.display = 'flex';
  document.getElementById('splash').innerHTML = `
    <div class="splash-icon">⏳</div>
    <div class="splash-title">Buscando ${ticker}...</div>
    <div class="loading-bar"></div>
    <div class="splash-sub">Obteniendo precio y las 10 bases OTM para el vencimiento.</div>
  `;
  document.getElementById('results').style.display = 'none';

  try {
    const res  = await fetch(`/.netlify/functions/get-options?ticker=${ticker}&expiry=${expiry}`);
    const data = await res.json();
    if (data.error) throw new Error(data.error);

    setStatus(`${ticker} · $${fmt(data.stockPrice)}`, 'ok');
    btn.disabled = false;
    render(data);
  } catch(err) {
    setStatus('Error', 'err');
    btn.disabled = false;
    document.getElementById('splash').innerHTML = `
      <div class="splash-icon">⚠️</div>
      <div class="splash-title">Error</div>
      <div class="splash-sub">${err.message}</div>
    `;
  }
}

function render(d) {
  const { ticker, stockPrice, stockChange, high52, low52, expiryLabel, dias, calls } = d;

  // Calcular TNA para cada call: ((strike + prima) / stockPrice - 1) / dias * 365
  const rows = calls.map(c => {
    const rendimiento = (c.strike + c.prima) / stockPrice - 1;
    const tna = rendimiento / dias * 365;
    const otmPct = (c.strike / stockPrice - 1) * 100;
    const beLanzador = stockPrice - c.prima;
    const maxGain = (c.strike - stockPrice + c.prima) * 100;
    return { ...c, rendimiento, tna, otmPct, beLanzador, maxGain };
  }).filter(r => r.tna > 0);

  const bestIdx = rows.reduce((bi, r, i) => r.tna > rows[bi].tna ? i : bi, 0);

  document.getElementById('splash').style.display = 'none';
  const res = document.getElementById('results');
  res.style.display = 'flex';

  const ejR = rows[bestIdx];
  res.innerHTML = `
    <div class="res-header">
      <div class="res-ticker">${ticker}</div>
      <div>
        <div class="res-price">$${fmt(stockPrice)}</div>
        <div class="res-chg ${stockChange >= 0 ? 'pos' : 'neg'}">${stockChange >= 0 ? '▲' : '▼'} ${Math.abs(stockChange||0).toFixed(2)}% hoy</div>
      </div>
      <div class="res-meta">
        <div class="rm"><div class="rm-l">52W High</div><div class="rm-v">$${fmt(high52||0,0)}</div></div>
        <div class="rm"><div class="rm-l">52W Low</div><div class="rm-v">$${fmt(low52||0,0)}</div></div>
        <div class="rm"><div class="rm-l">Vencimiento</div><div class="rm-v" style="color:var(--acc)">${expiryLabel}</div></div>
        <div class="rm"><div class="rm-l">Días al vto.</div><div class="rm-v" style="color:var(--acc3)">${dias}d</div></div>
        <div class="rm"><div class="rm-l">Mejor TNA</div><div class="rm-v" style="color:var(--acc)">${(ejR.tna*100).toFixed(1)}%</div></div>
      </div>
    </div>

    <div class="formula">
      📐 <b>TNA = ((Strike + Prima) ÷ Precio Acción − 1) ÷ Días × 365</b><br>
      Mejor base → Strike <b>$${fmt(ejR.strike,0)}</b> · Prima <b>$${fmt(ejR.prima)}</b> · Rend. <b>${(ejR.rendimiento*100).toFixed(2)}%</b> → TNA <b style="color:#fff;font-size:13px">${(ejR.tna*100).toFixed(2)}%</b>
    </div>

    <div class="tbl-wrap">
      <div class="tbl-bar">
        <span class="tbl-title"><span class="dot"></span>10 Bases OTM · CALL ${ticker} · ${expiryLabel}</span>
        <span style="font-size:10px;color:var(--muted)">🟢 ≥30% &nbsp;🔵 ≥15% &nbsp;🟠 ≥8%</span>
      </div>
      <table>
        <thead>
          <tr>
            <th>Strike</th><th>% OTM</th><th>Prima</th><th>Bid</th><th>Ask</th>
            <th>Rendimiento</th><th>TNA</th><th>BE lanzador</th><th>Volumen</th><th>OI</th>
          </tr>
        </thead>
        <tbody id="tbody"></tbody>
      </table>
    </div>

    <div class="charts-row">
      <div class="ch-card">
        <div class="ch-title">TNA % por Strike</div>
        <canvas id="chTNA" height="200"></canvas>
      </div>
      <div class="ch-card">
        <div class="ch-title">P&amp;L al vencimiento · Strike $${fmt(rows[0].strike,0)}</div>
        <canvas id="chPL" height="200"></canvas>
      </div>
    </div>

    <div class="warn">⚠️ Datos con hasta 15 min de delay (MarketData.app). Verificá siempre en tu broker antes de operar.</div>
  `;

  // Tabla
  const tbody = document.getElementById('tbody');
  rows.forEach((r, i) => {
    const tr = document.createElement('tr');
    if (i === bestIdx) tr.className = 'best';
    tr.innerHTML = `
      <td>$${fmt(r.strike,0)} ${i===bestIdx?'⭐':''}</td>
      <td style="color:var(--acc4)">+${r.otmPct.toFixed(1)}%</td>
      <td style="color:var(--acc)"><b>$${fmt(r.prima)}</b></td>
      <td style="color:var(--muted)">${r.bid?'$'+fmt(r.bid):'—'}</td>
      <td style="color:var(--muted)">${r.ask?'$'+fmt(r.ask):'—'}</td>
      <td>${(r.rendimiento*100).toFixed(2)}%</td>
      <td>${badge(r.tna)}</td>
      <td style="color:var(--acc3)">$${fmt(r.beLanzador)}</td>
      <td style="color:var(--muted)">${r.volumen?parseInt(r.volumen).toLocaleString():'—'}</td>
      <td style="color:var(--muted)">${r.oi?parseInt(r.oi).toLocaleString():'—'}</td>
    `;
    tbody.appendChild(tr);
  });

  // Chart TNA
  dc('c1');
  const tnaVals = rows.map(r => parseFloat((r.tna*100).toFixed(2)));
  charts['c1'] = new Chart(document.getElementById('chTNA'), {
    type: 'bar',
    data: {
      labels: rows.map(r => '$'+fmt(r.strike,0)),
      datasets: [{
        data: tnaVals,
        backgroundColor: tnaVals.map(v => v>=30?'rgba(200,255,87,0.6)':v>=15?'rgba(87,184,255,0.6)':v>=8?'rgba(255,170,87,0.6)':'rgba(255,87,87,0.5)'),
        borderColor:     tnaVals.map(v => v>=30?'#c8ff57':v>=15?'#57b8ff':v>=8?'#ffaa57':'#ff5757'),
        borderWidth: 1, borderRadius: 4
      }]
    },
    options: {
      responsive: true,
      plugins: { legend: { display: false }, tooltip: { callbacks: { label: ctx => ctx.raw+'% TNA' } } },
      scales: {
        x: { grid: { color: 'rgba(37,37,51,0.8)' }, ticks: { color: '#5a5a7a', font: { family:'Space Mono', size:10 } } },
        y: { grid: { color: 'rgba(37,37,51,0.8)' }, ticks: { color: '#5a5a7a', font: { family:'Space Mono', size:10 }, callback: v => v+'%' } }
      }
    }
  });

  // Chart P&L
  dc('c2');
  const S=stockPrice, K=rows[0].strike, P=rows[0].prima;
  const plL=[], plV=[];
  for (let p=S*0.78; p<=S*1.22; p+=S*0.44/50) {
    plL.push('$'+fmt(p,0));
    plV.push(parseFloat((Math.min(K-S+P, p-S+P)*100).toFixed(0)));
  }
  charts['c2'] = new Chart(document.getElementById('chPL'), {
    type: 'line',
    data: {
      labels: plL,
      datasets: [
        { data: plV, borderColor:'#c8ff57', segment:{borderColor: ctx=>ctx.p0.parsed.y<0?'#ff5757':'#c8ff57'}, backgroundColor:'rgba(200,255,87,0.04)', borderWidth:2.5, pointRadius:0, fill:true, tension:0.1 },
        { data: Array(plL.length).fill(0), borderColor:'rgba(255,255,255,0.08)', borderWidth:1, pointRadius:0, fill:false }
      ]
    },
    options: {
      responsive: true,
      plugins: { legend:{display:false}, tooltip:{callbacks:{label: ctx=>'$'+parseFloat(ctx.raw).toLocaleString()+' P&L'}} },
      scales: {
        x: { grid:{color:'rgba(37,37,51,0.8)'}, ticks:{color:'#5a5a7a', font:{family:'Space Mono',size:9}, maxTicksLimit:8} },
        y: { grid:{color:'rgba(37,37,51,0.8)'}, ticks:{color:'#5a5a7a', font:{family:'Space Mono',size:10}, callback:v=>'$'+v} }
      }
    }
  });
}
</script>
</body>
</html>
