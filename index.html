<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CoveredCall.io · Analizador de TNA</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Space+Mono:ital,wght@0,400;0,700;1,400&family=Syne:wght@400;600;800;900&display=swap');

  :root {
    --bg: #070709;
    --s1: #0e0e14;
    --s2: #16161f;
    --s3: #1e1e2a;
    --border: #252533;
    --border2: #303045;
    --acc: #c8ff57;
    --acc2: #ff5757;
    --acc3: #57b8ff;
    --acc4: #ffaa57;
    --text: #ddddf0;
    --muted: #5a5a7a;
    --muted2: #3a3a55;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { background: var(--bg); color: var(--text); font-family: 'Space Mono', monospace; height: 100%; }
  .app { display: flex; flex-direction: column; min-height: 100vh; }

  /* TOPBAR */
  .topbar {
    background: var(--s1); border-bottom: 1px solid var(--border);
    padding: 0 24px; height: 56px; display: flex; align-items: center;
    gap: 16px; flex-shrink: 0; position: sticky; top: 0; z-index: 100;
  }
  .logo { font-family: 'Syne', sans-serif; font-weight: 900; font-size: 16px; letter-spacing: -0.5px; white-space: nowrap; }
  .logo em { color: var(--acc); font-style: normal; }
  .divider { width: 1px; height: 24px; background: var(--border); flex-shrink: 0; }
  .field-wrap { display: flex; align-items: center; gap: 7px; }
  .lbl { font-size: 9px; color: var(--muted); letter-spacing: 1.5px; text-transform: uppercase; white-space: nowrap; }
  .inp {
    background: var(--s3); border: 1px solid var(--border2); color: var(--text);
    font-family: 'Space Mono', monospace; font-size: 12px; padding: 7px 10px;
    border-radius: 4px; outline: none; transition: border-color 0.15s;
  }
  .inp:focus { border-color: var(--acc); box-shadow: 0 0 0 2px rgba(200,255,87,0.1); }
  .inp.ticker { font-family: 'Syne', sans-serif; font-weight: 800; font-size: 14px; color: var(--acc); width: 90px; text-transform: uppercase; }
  .inp.expiry { width: 145px; }
  .btn-fetch {
    background: var(--acc); color: #070709; border: none;
    font-family: 'Syne', sans-serif; font-weight: 800; font-size: 11px;
    letter-spacing: 1px; padding: 9px 20px; border-radius: 4px; cursor: pointer;
    text-transform: uppercase; transition: all 0.15s; white-space: nowrap;
  }
  .btn-fetch:hover:not(:disabled) { background: #d9ff6e; transform: translateY(-1px); }
  .btn-fetch:disabled { opacity: 0.45; cursor: wait; }
  .pill { font-size: 10px; padding: 4px 10px; border-radius: 20px; letter-spacing: 0.5px; white-space: nowrap; }
  .pill-idle { background: var(--s3); color: var(--muted); }
  .pill-loading { background: rgba(200,255,87,0.1); color: var(--acc); border: 1px solid rgba(200,255,87,0.3); animation: pp 1s infinite; }
  .pill-ok { background: rgba(200,255,87,0.12); color: var(--acc); border: 1px solid rgba(200,255,87,0.25); }
  .pill-err { background: rgba(255,87,87,0.12); color: var(--acc2); border: 1px solid rgba(255,87,87,0.25); }
  @keyframes pp { 0%,100%{opacity:1} 50%{opacity:0.4} }

  /* CONTENT */
  .content { padding: 24px; display: flex; flex-direction: column; gap: 20px; max-width: 1400px; margin: 0 auto; width: 100%; }

  /* SPLASH */
  .splash { display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 65vh; gap: 14px; color: var(--muted); text-align: center; }
  .splash-icon { font-size: 48px; opacity: 0.2; }
  .splash-title { font-family: 'Syne', sans-serif; font-size: 20px; font-weight: 800; opacity: 0.3; }
  .splash-sub { font-size: 11px; opacity: 0.3; line-height: 1.9; }
  .loading-bar { height: 2px; width: 240px; background: linear-gradient(90deg, transparent, var(--acc), transparent); background-size: 200%; animation: shimmer 1.1s linear infinite; border-radius: 2px; }
  @keyframes shimmer { 0%{background-position:200%} 100%{background-position:-200%} }

  /* STOCK HEADER */
  .stock-header {
    background: var(--s1); border: 1px solid var(--border); border-radius: 8px;
    padding: 20px 24px; display: flex; align-items: center; gap: 32px; flex-wrap: wrap;
  }
  .stock-name { font-family: 'Syne', sans-serif; font-weight: 900; font-size: 30px; color: var(--acc); letter-spacing: -1px; }
  .stock-price { font-family: 'Syne', sans-serif; font-weight: 700; font-size: 24px; }
  .stock-chg { font-size: 12px; margin-top: 4px; }
  .pos { color: #4dff8f; } .neg { color: var(--acc2); }
  .stock-meta { display: flex; gap: 28px; margin-left: auto; flex-wrap: wrap; }
  .smeta { text-align: center; }
  .smeta-l { font-size: 9px; color: var(--muted); letter-spacing: 1px; text-transform: uppercase; }
  .smeta-v { font-family: 'Syne', sans-serif; font-weight: 700; font-size: 15px; margin-top: 3px; }

  /* FORMULA BOX */
  .formula-box {
    background: rgba(200,255,87,0.04); border: 1px solid rgba(200,255,87,0.18);
    border-radius: 6px; padding: 14px 20px; font-size: 11px; color: var(--acc);
    line-height: 2; font-family: 'Space Mono', monospace;
  }
  .formula-box b { color: #fff; }

  /* TABLE */
  .tbl-wrap { background: var(--s1); border: 1px solid var(--border); border-radius: 8px; overflow: hidden; }
  .tbl-head-bar {
    padding: 14px 20px; border-bottom: 1px solid var(--border);
    display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 8px;
  }
  .tbl-title { font-family: 'Syne', sans-serif; font-size: 11px; font-weight: 600; letter-spacing: 2px; color: var(--muted); text-transform: uppercase; }

  table { width: 100%; border-collapse: collapse; }
  thead th {
    background: var(--s3); padding: 10px 16px; text-align: right;
    font-size: 9px; letter-spacing: 1.2px; color: var(--muted);
    text-transform: uppercase; border-bottom: 1px solid var(--border2); white-space: nowrap;
  }
  thead th:first-child { text-align: left; }
  tbody td { padding: 12px 16px; text-align: right; border-bottom: 1px solid rgba(37,37,51,0.6); font-size: 12px; }
  tbody td:first-child { text-align: left; font-weight: 700; }
  tbody tr:last-child td { border-bottom: none; }
  tbody tr:hover { background: rgba(255,255,255,0.02); }
  tbody tr.best-row { background: rgba(200,255,87,0.04); border-left: 2px solid var(--acc); }

  .chip { display: inline-block; padding: 3px 10px; border-radius: 3px; font-size: 11px; font-weight: 700; font-family: 'Syne', sans-serif; }
  .chi { background: rgba(200,255,87,0.15); color: var(--acc); }
  .chm { background: rgba(87,184,255,0.15); color: var(--acc3); }
  .chl { background: rgba(255,170,87,0.15); color: var(--acc4); }
  .chx { background: rgba(255,87,87,0.12); color: var(--acc2); }

  /* CHARTS */
  .charts-row { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
  .ch-card { background: var(--s1); border: 1px solid var(--border); border-radius: 8px; padding: 18px; }
  .ch-title { font-family: 'Syne', sans-serif; font-size: 9px; font-weight: 600; letter-spacing: 1.5px; color: var(--muted); text-transform: uppercase; margin-bottom: 14px; }

  .warn { background: rgba(255,170,87,0.07); border: 1px solid rgba(255,170,87,0.2); border-radius: 6px; padding: 10px 16px; font-size: 10px; color: var(--acc4); line-height: 1.8; }

  .dot { width: 5px; height: 5px; border-radius: 50%; background: var(--acc); display: inline-block; animation: dpulse 2s infinite; vertical-align: middle; margin-right: 6px; }
  @keyframes dpulse { 0%,100%{opacity:1} 50%{opacity:0.2} }

  @media (max-width: 768px) {
    .charts-row { grid-template-columns: 1fr; }
    .topbar { flex-wrap: wrap; height: auto; padding: 12px; gap: 10px; }
  }
</style>
</head>
<body>
<div class="app">

  <div class="topbar">
    <div class="logo">COVERED<em>CALL</em>.io</div>
    <div class="divider"></div>
    <div class="field-wrap">
      <span class="lbl">Ticker</span>
      <input class="inp ticker" id="ticker" value="META" maxlength="6" oninput="this.value=this.value.toUpperCase()">
    </div>
    <div class="field-wrap">
      <span class="lbl">Vencimiento</span>
      <input class="inp expiry" id="expiryIn" type="date" value="2026-04-24">
    </div>
    <button class="btn-fetch" id="btnFetch" onclick="fetchData()">⚡ ANALIZAR</button>
    <span class="pill pill-idle" id="statusPill">En espera</span>
  </div>

  <div class="content">
    <div id="splash" class="splash">
      <div class="splash-icon">📊</div>
      <div class="splash-title">Analizador de Covered Calls</div>
      <div class="splash-sub">
        Ingresá el ticker y fecha de vencimiento.<br>
        Traemos las 10 bases OTM con precios reales y calculamos<br>
        la TNA de cada una automáticamente.
      </div>
    </div>
    <div id="results" style="display:none"></div>
  </div>

</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<script>

// ─── FÓRMULA TNA ──────────────────────────────────────────────────────────────
//
//   TNA = (prima / precioAccion) / dias * 365
//
//   Ejemplo: prima $10, acción $570, vto en 29 días
//   → rendimiento = 10 / 570 = 1.7544%
//   → TNA = 1.7544% / 29 * 365 = 22.08%
//
// ─────────────────────────────────────────────────────────────────────────────

function calcTNA(prima, precioAccion, dias) {
  const rendimiento = prima / precioAccion;
  const tna = rendimiento / dias * 365;
  return { rendimiento, tna };
}

function diasHasta(dateStr) {
  const hoy = new Date(); hoy.setHours(0,0,0,0);
  return Math.max(1, Math.ceil((new Date(dateStr + 'T00:00:00') - hoy) / 86400000));
}

function badge(tna) {
  const p = (tna * 100).toFixed(1) + '%';
  if (tna >= 0.30) return `<span class="chip chi">${p}</span>`;
  if (tna >= 0.15) return `<span class="chip chm">${p}</span>`;
  if (tna >= 0.08) return `<span class="chip chl">${p}</span>`;
  return `<span class="chip chx">${p}</span>`;
}

function fmt(n, d=2) {
  return parseFloat(n).toLocaleString('en-US', {minimumFractionDigits:d, maximumFractionDigits:d});
}

function setStatus(txt, type) {
  const el = document.getElementById('statusPill');
  el.textContent = txt;
  el.className = 'pill pill-' + type;
}

let charts = {};
function dc(id) { if(charts[id]){ charts[id].destroy(); delete charts[id]; } }

// ─── FETCH ────────────────────────────────────────────────────────────────────
async function fetchData() {
  const ticker = document.getElementById('ticker').value.toUpperCase().trim();
  const expiry = document.getElementById('expiryIn').value;
  if (!ticker || !expiry) { alert('Completá ticker y fecha'); return; }

  const btn = document.getElementById('btnFetch');
  btn.disabled = true;
  setStatus('Buscando...', 'loading');

  document.getElementById('splash').style.display = 'flex';
  document.getElementById('splash').innerHTML = `
    <div class="splash-icon">⏳</div>
    <div class="splash-title">Buscando ${ticker}...</div>
    <div class="loading-bar"></div>
    <div class="splash-sub">Obteniendo precio actual y las 10 bases OTM<br>para el vencimiento seleccionado.</div>
  `;
  document.getElementById('results').style.display = 'none';

  const DIAS = diasHasta(expiry);
  const expDate = new Date(expiry + 'T00:00:00');
  const expLabel = expDate.toLocaleDateString('en-US', { month:'short', day:'numeric', year:'numeric' });

  const prompt = `${ticker} options calls ${expLabel} OTM prices. Return ONLY JSON: {"ticker":"${ticker}","stockPrice":0,"stockChange":0,"high52":0,"low52":0,"expiryLabel":"${expLabel}","dias":${DIAS},"calls":[{"strike":0,"prima":0,"bid":0,"ask":0,"volumen":0,"oi":0}]}. Rules: calls=10 OTM CALLs strike>stockPrice sorted asc, prima=last price or mid(bid,ask), JSON only no markdown.`;

  try {
    const res = await fetch('/.netlify/functions/claude-proxy', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        model: 'claude-sonnet-4-20250514',
        max_tokens: 2000,
        tools: [{ type: 'web_search_20250305', name: 'web_search' }],
        messages: [{ role: 'user', content: prompt }]
      })
    });

    const data = await res.json();
    if (data.error) throw new Error(data.error);

    let rawText = '';
    for (const b of data.content) { if (b.type === 'text') rawText += b.text; }

    const match = rawText.replace(/```json|```/g, '').trim().match(/\{[\s\S]*\}/);
    if (!match) throw new Error('No se pudo parsear la respuesta de la IA');

    const parsed = JSON.parse(match[0]);
    setStatus(`${ticker} · $${fmt(parsed.stockPrice)}`, 'ok');
    btn.disabled = false;
    render(parsed);

  } catch(err) {
    console.error(err);
    setStatus('Error', 'err');
    btn.disabled = false;
    document.getElementById('splash').innerHTML = `
      <div class="splash-icon">⚠️</div>
      <div class="splash-title">Error al obtener datos</div>
      <div class="splash-sub">${err.message}<br><br>Verificá el ticker o intentá de nuevo.</div>
    `;
  }
}

// ─── RENDER ───────────────────────────────────────────────────────────────────
function render(d) {
  const { ticker, stockPrice, stockChange, high52, low52, expiryLabel, dias: DIAS, calls } = d;

  // Procesar cada call: calcular prima, TNA, rendimiento
  const rows = calls.map(c => {
    // Prima: usar last price; si es 0 o nulo, usar mid bid/ask
    let prima = (c.prima && c.prima > 0.01) ? c.prima : null;
    if (!prima && c.bid && c.ask && c.bid > 0) prima = (c.bid + c.ask) / 2;

    const otmPct = ((c.strike / stockPrice) - 1) * 100;

    // Breakeven del VENDEDOR (lanzador): si la acción baja hasta acá, la prima cubre la pérdida
    const beLanzador = stockPrice - (prima || 0);

    let rendimiento = null, tna = null;
    if (prima) {
      const r = calcTNA(prima, stockPrice, DIAS);
      rendimiento = r.rendimiento;
      tna = r.tna;
    }

    return { ...c, prima, otmPct, beLanzador, rendimiento, tna };
  }).filter(r => r.prima !== null && r.strike > stockPrice);

  if (rows.length === 0) {
    document.getElementById('splash').innerHTML = `
      <div class="splash-icon">⚠️</div>
      <div class="splash-title">Sin datos de opciones</div>
      <div class="splash-sub">No se encontraron calls OTM con precios para ese vencimiento.<br>Probá con otra fecha.</div>
    `;
    return;
  }

  // Mejor TNA = mayor TNA (primera OTM suele tener la mejor)
  const bestIdx = rows.reduce((bi, r, i) => (r.tna || 0) > (rows[bi]?.tna || 0) ? i : bi, 0);

  document.getElementById('splash').style.display = 'none';
  const res = document.getElementById('results');
  res.style.display = 'flex';
  res.style.flexDirection = 'column';
  res.style.gap = '20px';

  // Ejemplo dinámico para la formula con la primera fila
  const ej = rows[0];
  const ejTNA = ej.tna ? (ej.tna * 100).toFixed(2) : '—';
  const ejRend = ej.rendimiento ? (ej.rendimiento * 100).toFixed(2) : '—';

  res.innerHTML = `
    <div class="stock-header">
      <div>
        <div class="stock-name">${ticker}</div>
        <div style="font-size:9px;color:var(--muted);letter-spacing:1px;margin-top:2px">PRECIO ACTUAL</div>
      </div>
      <div>
        <div class="stock-price">$${fmt(stockPrice)}</div>
        <div class="stock-chg ${stockChange >= 0 ? 'pos' : 'neg'}">${stockChange >= 0 ? '▲' : '▼'} ${Math.abs(stockChange || 0).toFixed(2)}% hoy</div>
      </div>
      <div class="stock-meta">
        <div class="smeta"><div class="smeta-l">52W High</div><div class="smeta-v">$${high52 ? fmt(high52) : '—'}</div></div>
        <div class="smeta"><div class="smeta-l">52W Low</div><div class="smeta-v">$${low52 ? fmt(low52) : '—'}</div></div>
        <div class="smeta"><div class="smeta-l">Vencimiento</div><div class="smeta-v" style="color:var(--acc)">${expiryLabel}</div></div>
        <div class="smeta"><div class="smeta-l">Días al vto.</div><div class="smeta-v" style="color:var(--acc3)">${DIAS}d</div></div>
        <div class="smeta"><div class="smeta-l">Bases OTM</div><div class="smeta-v">${rows.length}</div></div>
      </div>
    </div>

    <div class="formula-box">
      📐 <b>TNA = (Prima ÷ Precio Acción) ÷ Días × 365</b><br>
      Ej. base más cercana: &nbsp;Prima <b>$${fmt(ej.prima)}</b> ÷ Acción <b>$${fmt(stockPrice)}</b> = <b>${ejRend}%</b> &nbsp;→&nbsp; ÷ ${DIAS}d × 365 = <b style="color:#fff;font-size:13px">${ejTNA}% TNA</b>
    </div>

    <div class="tbl-wrap">
      <div class="tbl-head-bar">
        <span class="tbl-title"><span class="dot"></span>10 Bases OTM · CALL ${ticker} · ${expiryLabel}</span>
        <span style="font-size:10px;color:var(--muted)">🟢 ≥30% &nbsp; 🔵 ≥15% &nbsp; 🟠 ≥8%</span>
      </div>
      <table>
        <thead>
          <tr>
            <th>Strike</th>
            <th>% OTM</th>
            <th>Prima last</th>
            <th>Bid</th>
            <th>Ask</th>
            <th>Rendimiento</th>
            <th>TNA</th>
            <th>BE lanzador</th>
            <th>Volumen</th>
            <th>Open Interest</th>
          </tr>
        </thead>
        <tbody id="mainTbody"></tbody>
      </table>
    </div>

    <div class="charts-row">
      <div class="ch-card">
        <div class="ch-title">TNA % por Strike</div>
        <canvas id="chTNA" height="210"></canvas>
      </div>
      <div class="ch-card">
        <div class="ch-title">P&amp;L al vencimiento · Strike $${fmt(rows[0].strike, 0)} (más cercano)</div>
        <canvas id="chPL" height="210"></canvas>
      </div>
    </div>

    <div class="warn">
      ⚠️ Primas obtenidas de Yahoo Finance (último precio operado o mid bid/ask). <b>BE lanzador</b> = precio al que la prima cubre la baja de la acción = Precio acción − Prima. Verificá siempre en tu broker antes de operar.
    </div>
  `;

  // TABLA
  const tbody = document.getElementById('mainTbody');
  rows.forEach((r, i) => {
    const tr = document.createElement('tr');
    if (i === bestIdx) tr.className = 'best-row';
    tr.innerHTML = `
      <td>$${fmt(r.strike, r.strike % 1 === 0 ? 0 : 2)} ${i === bestIdx ? '⭐' : ''}</td>
      <td style="color:var(--acc4)">+${r.otmPct.toFixed(1)}%</td>
      <td style="color:var(--acc)"><b>$${fmt(r.prima)}</b></td>
      <td style="color:var(--muted)">${r.bid ? '$'+fmt(r.bid) : '—'}</td>
      <td style="color:var(--muted)">${r.ask ? '$'+fmt(r.ask) : '—'}</td>
      <td>${r.rendimiento !== null ? (r.rendimiento*100).toFixed(2)+'%' : '—'}</td>
      <td>${r.tna !== null ? badge(r.tna) : '—'}</td>
      <td style="color:var(--acc3)">$${fmt(r.beLanzador)}</td>
      <td style="color:var(--muted)">${r.volumen ? parseInt(r.volumen).toLocaleString() : '—'}</td>
      <td style="color:var(--muted)">${r.oi ? parseInt(r.oi).toLocaleString() : '—'}</td>
    `;
    tbody.appendChild(tr);
  });

  // CHART TNA
  dc('c1');
  const labelsC1 = rows.map(r => '$' + fmt(r.strike, 0));
  const tnaData = rows.map(r => r.tna !== null ? parseFloat((r.tna * 100).toFixed(2)) : 0);
  charts['c1'] = new Chart(document.getElementById('chTNA'), {
    type: 'bar',
    data: {
      labels: labelsC1,
      datasets: [{
        label: 'TNA %',
        data: tnaData,
        backgroundColor: tnaData.map(v => v >= 30 ? 'rgba(200,255,87,0.65)' : v >= 15 ? 'rgba(87,184,255,0.65)' : v >= 8 ? 'rgba(255,170,87,0.65)' : 'rgba(255,87,87,0.5)'),
        borderColor: tnaData.map(v => v >= 30 ? '#c8ff57' : v >= 15 ? '#57b8ff' : v >= 8 ? '#ffaa57' : '#ff5757'),
        borderWidth: 1, borderRadius: 4
      }]
    },
    options: {
      responsive: true, animation: { duration: 500 },
      plugins: { legend: { display: false }, tooltip: { callbacks: { label: ctx => ctx.raw + '% TNA' } } },
      scales: {
        x: { grid: { color: 'rgba(37,37,51,0.8)' }, ticks: { color: '#5a5a7a', font: { family: 'Space Mono', size: 10 } } },
        y: { grid: { color: 'rgba(37,37,51,0.8)' }, ticks: { color: '#5a5a7a', font: { family: 'Space Mono', size: 10 }, callback: v => v + '%' } }
      }
    }
  });

  // CHART P&L — strike más cercano (primer OTM)
  dc('c2');
  const S = stockPrice;
  const K = rows[0].strike;
  const P = rows[0].prima;
  const plLabels = [], plVals = [];
  const priceMin = S * 0.78, priceMax = S * 1.20;
  const step = (priceMax - priceMin) / 45;
  for (let price = priceMin; price <= priceMax + 0.01; price += step) {
    plLabels.push('$' + fmt(price, 0));
    // Covered call: tenés 100 acciones + vendiste 1 call
    // Ganancia = si sube hasta el strike, ganás (K - S) + prima
    // Si baja, perdés (price - S) + prima (la prima amortigua)
    // Si sube más del strike, tu ganancia está capeada en (K - S) + prima
    const pl = Math.min(K - S + P, price - S + P) * 100;
    plVals.push(parseFloat(pl.toFixed(0)));
  }
  charts['c2'] = new Chart(document.getElementById('chPL'), {
    type: 'line',
    data: {
      labels: plLabels,
      datasets: [
        {
          data: plVals,
          borderColor: '#c8ff57',
          segment: { borderColor: ctx => ctx.p0.parsed.y < 0 ? '#ff5757' : '#c8ff57' },
          backgroundColor: 'rgba(200,255,87,0.04)',
          borderWidth: 2.5, pointRadius: 0, fill: true, tension: 0.1
        },
        { data: Array(plLabels.length).fill(0), borderColor: 'rgba(255,255,255,0.08)', borderWidth: 1, pointRadius: 0, fill: false }
      ]
    },
    options: {
      responsive: true, animation: { duration: 500 },
      plugins: {
        legend: { display: false },
        tooltip: { callbacks: { label: ctx => '$' + parseFloat(ctx.raw).toLocaleString('es-AR') + ' P&L (1 lote)' } }
      },
      scales: {
        x: { grid: { color: 'rgba(37,37,51,0.8)' }, ticks: { color: '#5a5a7a', font: { family: 'Space Mono', size: 9 }, maxTicksLimit: 8 } },
        y: { grid: { color: 'rgba(37,37,51,0.8)' }, ticks: { color: '#5a5a7a', font: { family: 'Space Mono', size: 10 }, callback: v => '$' + v } }
      }
    }
  });
}
</script>
</body>
</html>
